# More option see https://github.com/DreamMaoMao/mango/wiki/

# Monitors
monitorrule=name:DP-1,width:5120,height:1440,refresh:240,x:0,y:0
#monitorrule=name:DP-1,width:2560,height:1080,refresh:60,x:0,y:0
#monitorrule=name:DP-2,width:1920,height:1080,refresh:60,x:2560,y:-632,scale:1,rr:3,vrr:0

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=4
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.95

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=0
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs = 10
scroller_default_proportion = 0.5
scroller_default_proportion_single = 0.75
scroller_ignore_proportion_single = 0
scroller_focus_center = 0
scroller_prefer_center = 0
scroller_prefer_overspread = 0
scroller_proportion_preset=0.33,0.5,1.0
edge_scroller_pointer_focus=1


# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=1
focus_cross_tag=0
exchange_cross_monitor=1
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=2
rootcolor=0x201b14ff
bordercolor=0x444444ff
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
# monitor 1
tagrule=id:1,monitor_name:DP-1,no_hide:1,layout_name:scroller
tagrule=id:2,monitor_name:DP-1,no_hide:1,layout_name:scroller
tagrule=id:3,monitor_name:DP-1,no_hide:1,layout_name:scroller
tagrule=id:4,monitor_name:DP-1,no_hide:1,layout_name:scroller
tagrule=id:5,monitor_name:DP-1,no_hide:1,layout_name:scroller
tagrule=id:6,monitor_name:DP-1,no_hide:1,layout_name:scroller
tagrule=id:7,monitor_name:DP-1,no_hide:1,layout_name:scroller
tagrule=id:8,monitor_name:DP-1,no_hide:1,layout_name:scroller
tagrule=id:9,monitor_name:DP-1,no_hide:1,layout_name:scroller

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config

# Lauch apps
bind=Alt,space,spawn,qs -c noctalia-shell ipc call launcher toggle
bind=SUPER,space,spawn,qs -c noctalia-shell ipc call launcher toggle
bind=Alt,Return,spawn,ghostty
bind=SUPER,Return,spawn,ghostty
bind=SUPER,s,spawn,qs -c noctalia-shell ipc call controlCenter toggle
bind=SUPER,comma,spawn,qs -c noctalia-shell ipc call settings toggle
bind=CTRL+ALT,Delete,spawn,qs -c noctalia-shell ipc call sessionMenu toggle
bind=SUPER,z,spawn,zen-browser
bind=SUPER+SHIFT,z,spawn,zen-browser --private-window
bind=SUPER,f,spawn,thunar
bind=SUPER+SHIFT,f,spawn,ghostty -e yazi
bind=SUPER,l,spawn,qs -c noctalia-shell ipc call lockScreen lock
bind=CTRL+SHIFT,ESCAPE,spawn,ghostty -e btop


# Media keys
bind=NONE,XF86AudioRaiseVolume,spawn,qs -c noctalia-shell ipc call volume increase
bind=NONE,XF86AudioLowerVolume,spawn,qs -c noctalia-shell ipc call volume decrease
bind=NONE,XF86AudioMute,spawn,qs -c noctalia-shell ipc call volume muteOutput
bind=NONE,XF86MonBrightnessUp,spawn,qs -c noctalia-shell ipc call brightness increase
bind=NONE,XF86MonBrightnessDown,spawn,qs -c noctalia-shell ipc call brightness decrease

# exit
bind=SUPER,m,quit
bind=SUPER,q,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=ALT,backslash,togglefloating,
bind=ALT,a,togglemaximizescreen,A,Rig
bind=ALT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=SUPER,e,set_proportion,1.0
bind=SUPER,x,switch_proportion_preset,

# switch layout
bind=SUPER,n,switch_layout

# tag switch
bind=ALT,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=ALT,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0


bind=SUPER,1,viewcrossmon,1,DP-1
bind=SUPER,2,viewcrossmon,2,DP-1
bind=SUPER,3,viewcrossmon,3,DP-1
bind=SUPER,4,viewcrossmon,4,DP-1
bind=SUPER,5,viewcrossmon,5,DP-1
bind=SUPER,6,viewcrossmon,6,DP-1
bind=SUPER,7,viewcrossmon,7,DP-1
bind=SUPER,8,viewcrossmon,8,DP-1
bind=SUPER,9,viewcrossmon,9,DP-1

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tagcrossmon,1,DP-1
bind=SUPER+SHIFT,2,tagcrossmon,2,DP-1
bind=SUPER+SHIFT,3,tagcrossmon,3,DP-1
bind=SUPER+SHIFT,4,tagcrossmon,4,DP-1
bind=SUPER+SHIFT,5,tagcrossmon,5,DP-1
bind=SUPER+SHIFT,6,tagcrossmon,6,DP-1
bind=SUPER+SHIFT,7,tagcrossmon,7,DP-1
bind=SUPER+SHIFT,8,tagcrossmon,8,DP-1
bind=SUPER+SHIFT,9,tagcrossmon,9,DP-1

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
#bind=SUPER+Alt,Left,tagmon,left
#bind=SUPER+Alt,Right,tagmon,right
bind=SUPER+ALT,left,tagmon,left,1   # keep tag number
bind=SUPER+ALT,right,tagmon,right,1

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
axisbind=SUPER,LEFT,focusdir,left
axisbind=SUPER,RIGHT,focusdir,right

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

# window rules
windowrule=isfloating:1,width:720,height:720,title:Smile
windowrule=isfloating:1,width:720,height:720,title:Qalculate!
windowrule=istagsilent:0,monitor:DP-2,tags:6,appid:vesktop
windowrule=istagsilent:1,monitor:DP-1,tags:2,appid:codium
windowrule=istagsilent:0,monitor:DP-1,tags:1,appid:zen

# Autostart
exec-once=qs -c noctalia-shell --no-duplicate
exec-once=zen-browser
exec-once=vesktop
exec-once=codium
exec-once=sleep 5 && mmsg -d tagcrossmon,6,DP-2