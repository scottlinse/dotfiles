##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Workspace → monitor assignment
# Force workspace 1–5 onto DP-1 (main monitor)
workspace = 1, name:一, monitor:DP-1, persistent:true, layout:scrolling
workspace = 2, name:二, monitor:DP-1, persistent:true, layout:scrolling
workspace = 3, name:三, monitor:DP-1, persistent:true, layout:scrolling
workspace = 4, name:四, monitor:DP-1, persistent:true, layout:scrolling
workspace = 5, name:五, monitor:DP-1, persistent:true, layout:scrolling

# Force workspace 6–10 onto DP-2 (side monitor)
workspace = 6, name:六, monitor:DP-2, persistent:true
workspace = 7, name:七, monitor:DP-2, persistent:true
workspace = 8, name:八, monitor:DP-2, persistent:true
workspace = 9, name:九, monitor:DP-2, persistent:true
workspace = 10, name:十, monitor:DP-2, persistent:true

# Name the workspaces
exec-once = hyprctl dispatch renameworkspace 1 一
exec-once = hyprctl dispatch renameworkspace 2 二
exec-once = hyprctl dispatch renameworkspace 3 三
exec-once = hyprctl dispatch renameworkspace 4 四
exec-once = hyprctl dispatch renameworkspace 5 五
exec-once = hyprctl dispatch renameworkspace 6 六
exec-once = hyprctl dispatch renameworkspace 7 七
exec-once = hyprctl dispatch renameworkspace 8 八
exec-once = hyprctl dispatch renameworkspace 9 九
exec-once = hyprctl dispatch renameworkspace 10 十

windowrule {
    name = ghostty-opacity
    match:class = ghostty
    opacity = 0.8 0.8
}

windowrule {
    name = smile-float
    match:title = ^(Smile)$
    float = on
    decorate = on
    center = on
    size = 720 720
}

windowrule {
    name = qal
    match:class = qalculate-gtk
    float = on
    center = on
    size = 720 720
}

windowrule {
    name = codium-workspace-2
    match:class = ^(codium)$
    workspace = 2
}

windowrule {
    name = vesktop-right-monitor
    match:class = ^(vesktop)$
    workspace = 6
}

# Ignore maximize requests from all apps. You'll probably like this.
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

cursor {
    no_hardware_cursors = true
}